# Grafana dashboard provisioning — Packet Drop 분석 묶음 (single-node 드릴다운).
# 모든 JSON을 Grafana 폴더 "Packet Drop"으로 로드. uid가 JSON에 고정돼 있어 드릴다운 링크가 안정적.
apiVersion: 1
providers:
  - name: packet-drop
    type: file
    folder: "Packet Drop"
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards/packet-drop
      foldersFromFilesStructure: false
