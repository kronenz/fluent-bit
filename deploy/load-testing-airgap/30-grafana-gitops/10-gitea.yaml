# Gitea — GitLab 호환 lightweight git server (testbed 용)
#
# 운영 시 swap:
#   • Service URL 만 bitbucket / gitlab 로 교체 → seed/provisioner Job 의
#     GIT_REMOTE_URL env 한 줄만 변경
#   • 인증: HTTP basic → personal access token (헤더만 교체)
#
# 단순화:
#   • sqlite3 (DB pod 없음)
#   • emptyDir (testbed 한정 — 재시작 시 repo 휘발됨. 영구 보관 필요 시 PVC)
#   • install lock + 초기 admin 자동 생성 (lifecycle postStart)
---
apiVersion: v1
kind: Secret
metadata:
  name: gitea-creds
  namespace: gitops
type: Opaque
stringData:
  username: gitops
  password: gitops-pw
  email: gitops@local
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitea
  namespace: gitops
  labels: { app: gitea }
spec:
  replicas: 1
  selector: { matchLabels: { app: gitea } }
  strategy: { type: Recreate }
  template:
    metadata:
      labels: { app: gitea }
    spec:
      containers:
        - name: gitea
          image: gitea/gitea:1.21-rootless
          imagePullPolicy: IfNotPresent
          ports:
            - { name: http, containerPort: 3000 }
            - { name: ssh,  containerPort: 2222 }
          env:
            # 자동 install (UI 마법사 건너뛰기)
            - { name: GITEA__security__INSTALL_LOCK,   value: "true" }
            - { name: GITEA__database__DB_TYPE,        value: "sqlite3" }
            - { name: GITEA__database__PATH,           value: "/var/lib/gitea/data/gitea.db" }
            - { name: GITEA__server__ROOT_URL,         value: "http://gitea.gitops.svc:3000/" }
            - { name: GITEA__server__DOMAIN,           value: "gitea.gitops.svc" }
            - { name: GITEA__server__HTTP_PORT,        value: "3000" }
            - { name: GITEA__server__SSH_PORT,         value: "2222" }
            - { name: GITEA__service__DISABLE_REGISTRATION, value: "true" }
            - { name: GITEA__log__MODE,                value: "console" }
            - { name: GITEA__log__LEVEL,               value: "Info" }
            # 초기 admin (lifecycle postStart 가 사용)
            - { name: GITEA_ADMIN_USER,     valueFrom: { secretKeyRef: { name: gitea-creds, key: username } } }
            - { name: GITEA_ADMIN_PASSWORD, valueFrom: { secretKeyRef: { name: gitea-creds, key: password } } }
            - { name: GITEA_ADMIN_EMAIL,    valueFrom: { secretKeyRef: { name: gitea-creds, key: email    } } }
          lifecycle:
            postStart:
              exec:
                # 컨테이너 시작 후 gitea 가 listen 할 때까지 대기 → admin 생성 (멱등)
                command:
                  - /bin/sh
                  - -c
                  - |
                    for i in $(seq 1 30); do
                      if curl -fsS http://localhost:3000/api/v1/version >/dev/null 2>&1; then break; fi
                      sleep 2
                    done
                    gitea admin user create \
                      --username "$GITEA_ADMIN_USER" \
                      --password "$GITEA_ADMIN_PASSWORD" \
                      --email    "$GITEA_ADMIN_EMAIL" \
                      --admin --must-change-password=false 2>/dev/null || true
          readinessProbe:
            httpGet: { path: /api/v1/version, port: 3000 }
            periodSeconds: 5
            failureThreshold: 30
          resources:
            requests: { cpu: "100m",  memory: "256Mi" }
            limits:   { cpu: "1000m", memory: "1Gi"   }
          volumeMounts:
            - { name: data, mountPath: /var/lib/gitea }
            - { name: cfg,  mountPath: /etc/gitea }
      volumes:
        # testbed: emptyDir 로 휘발성 — 운영 시 PVC 권장
        - { name: data, emptyDir: {} }
        - { name: cfg,  emptyDir: {} }
---
apiVersion: v1
kind: Service
metadata:
  name: gitea
  namespace: gitops
  labels: { app: gitea }
spec:
  type: NodePort
  selector: { app: gitea }
  ports:
    - { name: http, port: 3000, targetPort: 3000, nodePort: 30300 }
    - { name: ssh,  port: 2222, targetPort: 2222, nodePort: 30222 }
