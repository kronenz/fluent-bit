# 'bitbucket repo' 의 testbed 시뮬레이션 — seed Job 이 이 ConfigMap 의 key 들을
# 디렉터리 트리로 펼쳐서 (__ → /) gitea 에 push.
#
# 운영에선 이 ConfigMap 대신 실제 bitbucket clone URL 을 사용 → seed Job 자체가
# 불필요해지고, provisioner Job 만 직접 bitbucket 에서 clone.
#
# 디렉터리 트리:
#   dashboards/
#   ├── ingest-pipeline/
#   │   ├── opensearch/        (cluster-overview, index-performance)
#   │   └── fluent-bit/        (pipeline-throughput, memory-usage)
#   ├── infrastructure/
#   │   ├── compute/           (node-overview, pod-resources)
#   │   └── network/           (connectivity)
#   ├── application/           (spark-jobs, trino-queries)
#   └── chaos-and-reliability/ (failure-drill)
#
# 각 대시보드 = uid 고정 (재배포 멱등) + Prometheus 데이터소스 (provisioner 가
# org 마다 동일 datasource 자동 생성).
apiVersion: v1
kind: ConfigMap
metadata:
  name: dashboards-repo
  namespace: gitops
data:
  # --- 메타 ---
  orgs.json: |
    {
      "orgs": [
        { "name": "Engineering" },
        { "name": "DataPlatform" },
        { "name": "Security" },
        { "name": "Operations" },
        { "name": "Research" }
      ]
    }
  README.md: |
    # grafana-dashboards (testbed seed)

    조직 5개에 동일 폴더 트리 + 동일 대시보드를 배포하는 source-of-truth.
    디렉터리 = Grafana 폴더 (UID = path-slug, 중첩 = parentUid).

  # --- Ingest Pipeline / OpenSearch ---
  # 메트릭 prefix: opensearch_* (aiven prometheus-exporter-plugin-for-opensearch).
  # opensearch_cluster_status 는 단일 값 (0=green, 1=yellow, 2=red).
  # 본 dashboard 들은 1=G/2=Y/3=R 표기 일관성을 위해 (status + 1) 로 사용.
  dashboards__ingest-pipeline__opensearch__cluster-overview.json: |
    {
      "uid": "loadtest-os-cluster-overview",
      "title": "OpenSearch Cluster Overview",
      "tags": ["loadtest", "opensearch", "cluster"],
      "schemaVersion": 39, "version": 1, "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "panels": [
        { "id": 1, "type": "stat", "title": "Cluster Status (1=G 2=Y 3=R)",
          "gridPos": {"x":0,"y":0,"w":6,"h":4},
          "targets": [{"expr":"(opensearch_cluster_status + 1)","refId":"A"}] },
        { "id": 2, "type": "stat", "title": "Nodes",
          "gridPos": {"x":6,"y":0,"w":4,"h":4},
          "targets": [{"expr":"max(opensearch_cluster_nodes_number)","refId":"A"}] },
        { "id": 3, "type": "stat", "title": "Active Shards",
          "gridPos": {"x":10,"y":0,"w":4,"h":4},
          "targets": [{"expr":"max(opensearch_cluster_shards_number{type=\"active\"})","refId":"A"}] },
        { "id": 4, "type": "stat", "title": "Unassigned",
          "gridPos": {"x":14,"y":0,"w":4,"h":4},
          "targets": [{"expr":"max(opensearch_cluster_shards_number{type=\"unassigned\"})","refId":"A"}] },
        { "id": 5, "type": "timeseries", "title": "Cluster Indexing RPS",
          "gridPos": {"x":0,"y":4,"w":24,"h":8},
          "targets": [{"expr":"sum(rate(opensearch_indices_indexing_index_count[1m]))","refId":"A"}] }
      ]
    }
  dashboards__ingest-pipeline__opensearch__index-performance.json: |
    {
      "uid": "loadtest-os-index-perf",
      "title": "OpenSearch Index Performance",
      "tags": ["loadtest", "opensearch", "index"],
      "schemaVersion": 39, "version": 1, "refresh": "30s",
      "time": { "from": "now-3h", "to": "now" },
      "panels": [
        { "id": 1, "type": "timeseries", "title": "Avg Indexing Latency (ms)",
          "gridPos": {"x":0,"y":0,"w":12,"h":8},
          "targets": [{"expr":"sum(rate(opensearch_indices_indexing_index_time_seconds[5m])) / sum(rate(opensearch_indices_indexing_index_count[5m])) * 1000","refId":"A"}] },
        { "id": 2, "type": "timeseries", "title": "Write Queue Depth",
          "gridPos": {"x":12,"y":0,"w":12,"h":8},
          "targets": [{"expr":"max(opensearch_threadpool_tasks_number{name=\"write\",type=\"queue\"})","refId":"A"}] },
        { "id": 3, "type": "timeseries", "title": "Bulk Rejected (cumulative)",
          "gridPos": {"x":0,"y":8,"w":12,"h":6},
          "targets": [{"expr":"max(opensearch_threadpool_threads_count{name=\"write\",type=\"rejected\"})","refId":"A"}] },
        { "id": 4, "type": "timeseries", "title": "Segment Count",
          "gridPos": {"x":12,"y":8,"w":12,"h":6},
          "targets": [{"expr":"sum(opensearch_indices_segments_number)","refId":"A"}] }
      ]
    }

  # --- §1 Bulk Indexing 처리량/지연 ---
  dashboards__ingest-pipeline__opensearch__bulk-throughput-latency.json: |
    {
      "uid": "loadtest-os-bulk-throughput",
      "title": "OpenSearch Bulk — Throughput & Latency",
      "tags": ["loadtest", "opensearch", "bulk", "scenario-1"],
      "schemaVersion": 39, "version": 1, "refresh": "15s",
      "time": { "from": "now-1h", "to": "now" },
      "panels": [
        { "id": 1, "type": "stat", "title": "Current RPS (docs/s)",
          "gridPos": {"x":0,"y":0,"w":6,"h":4},
          "targets": [{"expr":"sum(rate(opensearch_indices_indexing_index_count[1m]))","refId":"A"}] },
        { "id": 2, "type": "stat", "title": "Avg Latency (ms)",
          "gridPos": {"x":6,"y":0,"w":6,"h":4},
          "targets": [{"expr":"sum(rate(opensearch_indices_indexing_index_time_seconds[1m])) / sum(rate(opensearch_indices_indexing_index_count[1m])) * 1000","refId":"A"}] },
        { "id": 3, "type": "stat", "title": "Bulk Rejected (since start)",
          "gridPos": {"x":12,"y":0,"w":6,"h":4},
          "targets": [{"expr":"max(opensearch_threadpool_threads_count{name=\"write\",type=\"rejected\"})","refId":"A"}] },
        { "id": 4, "type": "stat", "title": "Cluster Status",
          "gridPos": {"x":18,"y":0,"w":6,"h":4},
          "targets": [{"expr":"(opensearch_cluster_status + 1)","refId":"A"}] },
        { "id": 5, "type": "timeseries", "title": "Indexing RPS",
          "gridPos": {"x":0,"y":4,"w":12,"h":8},
          "targets": [{"expr":"sum(rate(opensearch_indices_indexing_index_count[1m]))","refId":"A","legendFormat":"docs/s"}] },
        { "id": 6, "type": "timeseries", "title": "Avg Indexing Latency (ms)",
          "gridPos": {"x":12,"y":4,"w":12,"h":8},
          "targets": [{"expr":"sum(rate(opensearch_indices_indexing_index_time_seconds[1m])) / sum(rate(opensearch_indices_indexing_index_count[1m])) * 1000","refId":"A"}] },
        { "id": 7, "type": "timeseries", "title": "Write Queue Depth (per node)",
          "gridPos": {"x":0,"y":12,"w":12,"h":6},
          "targets": [{"expr":"opensearch_threadpool_tasks_number{name=\"write\",type=\"queue\"}","refId":"A","legendFormat":"{{name}}"}] },
        { "id": 8, "type": "timeseries", "title": "Bulk Rejected (rate)",
          "gridPos": {"x":12,"y":12,"w":12,"h":6},
          "targets": [{"expr":"sum(rate(opensearch_threadpool_threads_count{name=\"write\",type=\"rejected\"}[1m]))","refId":"A"}] }
      ]
    }

  # --- §2 인덱싱 + 검색 동시 부하 ---
  dashboards__ingest-pipeline__opensearch__mixed-ingest-search.json: |
    {
      "uid": "loadtest-os-mixed-load",
      "title": "OpenSearch Mixed — Ingest + Search",
      "tags": ["loadtest", "opensearch", "mixed", "scenario-2"],
      "schemaVersion": 39, "version": 1, "refresh": "15s",
      "time": { "from": "now-1h", "to": "now" },
      "panels": [
        { "id": 1, "type": "stat", "title": "Cluster Status",
          "gridPos": {"x":0,"y":0,"w":6,"h":4},
          "targets": [{"expr":"(opensearch_cluster_status + 1)","refId":"A"}] },
        { "id": 2, "type": "timeseries", "title": "Indexing vs Search RPS",
          "gridPos": {"x":6,"y":0,"w":18,"h":8},
          "targets": [
            {"expr":"sum(rate(opensearch_indices_indexing_index_count[1m]))","refId":"A","legendFormat":"index/s"},
            {"expr":"sum(rate(opensearch_indices_search_query_count[1m]))","refId":"B","legendFormat":"search/s"}
          ]
        },
        { "id": 3, "type": "timeseries", "title": "Avg Search Latency (ms)",
          "gridPos": {"x":0,"y":8,"w":12,"h":8},
          "targets": [{"expr":"sum(rate(opensearch_indices_search_query_time_seconds[1m])) / sum(rate(opensearch_indices_search_query_count[1m])) * 1000","refId":"A"}] },
        { "id": 4, "type": "timeseries", "title": "Thread Pool Queue Depth",
          "gridPos": {"x":12,"y":8,"w":12,"h":8},
          "targets": [
            {"expr":"max(opensearch_threadpool_tasks_number{name=\"write\",type=\"queue\"})","refId":"A","legendFormat":"write"},
            {"expr":"max(opensearch_threadpool_tasks_number{name=\"search\",type=\"queue\"})","refId":"B","legendFormat":"search"},
            {"expr":"max(opensearch_threadpool_tasks_number{name=\"get\",type=\"queue\"})","refId":"C","legendFormat":"get"}
          ]
        },
        { "id": 5, "type": "timeseries", "title": "JVM Heap Used %",
          "gridPos": {"x":0,"y":16,"w":12,"h":6},
          "targets": [{"expr":"max(opensearch_jvm_mem_heap_used_percent)","refId":"A"}] },
        { "id": 6, "type": "timeseries", "title": "Search Rejections (rate)",
          "gridPos": {"x":12,"y":16,"w":12,"h":6},
          "targets": [{"expr":"sum(rate(opensearch_threadpool_threads_count{name=\"search\",type=\"rejected\"}[1m]))","refId":"A"}] }
      ]
    }

  # --- §3 Spark/Airflow Batch Wave ---
  dashboards__ingest-pipeline__opensearch__batch-wave.json: |
    {
      "uid": "loadtest-os-batch-wave",
      "title": "OpenSearch Spark/Airflow Batch Wave",
      "tags": ["loadtest", "opensearch", "wave", "scenario-3"],
      "schemaVersion": 39, "version": 1, "refresh": "30s",
      "time": { "from": "now-2h", "to": "now" },
      "panels": [
        { "id": 1, "type": "stat", "title": "Peak RPS (1h)",
          "gridPos": {"x":0,"y":0,"w":6,"h":4},
          "targets": [{"expr":"max_over_time((sum(rate(opensearch_indices_indexing_index_count[1m])))[1h:1m])","refId":"A"}] },
        { "id": 2, "type": "stat", "title": "Circuit Breaker Trips",
          "gridPos": {"x":6,"y":0,"w":6,"h":4},
          "targets": [{"expr":"sum(opensearch_circuitbreaker_tripped_count)","refId":"A"}] },
        { "id": 3, "type": "stat", "title": "Status Stability",
          "gridPos": {"x":12,"y":0,"w":6,"h":4},
          "targets": [{"expr":"changes(opensearch_cluster_status[1h])","refId":"A"}] },
        { "id": 4, "type": "stat", "title": "Segment Count Δ (1h)",
          "gridPos": {"x":18,"y":0,"w":6,"h":4},
          "targets": [{"expr":"delta(sum(opensearch_indices_segments_number)[1h:1m])","refId":"A"}] },
        { "id": 5, "type": "timeseries", "title": "Bulk RPS Wave (1m window)",
          "gridPos": {"x":0,"y":4,"w":24,"h":8},
          "targets": [{"expr":"sum(rate(opensearch_indices_indexing_index_count[1m]))","refId":"A"}] },
        { "id": 6, "type": "timeseries", "title": "GC Time per Second",
          "gridPos": {"x":0,"y":12,"w":12,"h":6},
          "targets": [{"expr":"sum(rate(opensearch_jvm_gc_collection_time_seconds[1m]))","refId":"A"}] },
        { "id": 7, "type": "timeseries", "title": "Circuit Breaker Tripped Total",
          "gridPos": {"x":12,"y":12,"w":12,"h":6},
          "targets": [{"expr":"sum(opensearch_circuitbreaker_tripped_count) by (breaker)","refId":"A","legendFormat":"{{breaker}}"}] }
      ]
    }

  # --- §4 190-Node 지속 부하 ---
  dashboards__ingest-pipeline__opensearch__sustained-load-190.json: |
    {
      "uid": "loadtest-os-sustained-190",
      "title": "OpenSearch 190-Node Sustained Load",
      "tags": ["loadtest", "opensearch", "sustained", "scenario-4"],
      "schemaVersion": 39, "version": 1, "refresh": "1m",
      "time": { "from": "now-24h", "to": "now" },
      "panels": [
        { "id": 1, "type": "stat", "title": "Aggregate RPS",
          "gridPos": {"x":0,"y":0,"w":6,"h":4},
          "targets": [{"expr":"sum(rate(opensearch_indices_indexing_index_count[5m]))","refId":"A"}] },
        { "id": 2, "type": "stat", "title": "Total Docs (Cluster)",
          "gridPos": {"x":6,"y":0,"w":6,"h":4},
          "targets": [{"expr":"sum(opensearch_indices_doc_number)","refId":"A"}] },
        { "id": 3, "type": "stat", "title": "Disk Used Max %",
          "gridPos": {"x":12,"y":0,"w":6,"h":4},
          "targets": [{"expr":"max((1 - opensearch_fs_total_available_bytes / opensearch_fs_total_total_bytes) * 100)","refId":"A"}] },
        { "id": 4, "type": "stat", "title": "Status Changes (24h)",
          "gridPos": {"x":18,"y":0,"w":6,"h":4},
          "targets": [{"expr":"changes(opensearch_cluster_status[24h])","refId":"A"}] },
        { "id": 5, "type": "timeseries", "title": "Per-Node Indexing RPS (top 10)",
          "gridPos": {"x":0,"y":4,"w":24,"h":8},
          "targets": [{"expr":"topk(10, sum by (name) (rate(opensearch_indices_indexing_index_count[5m])))","refId":"A","legendFormat":"{{name}}"}] },
        { "id": 6, "type": "timeseries", "title": "Per-Node Disk Used %",
          "gridPos": {"x":0,"y":12,"w":12,"h":8},
          "targets": [{"expr":"(1 - opensearch_fs_total_available_bytes / opensearch_fs_total_total_bytes) * 100","refId":"A","legendFormat":"{{name}}"}] },
        { "id": 7, "type": "timeseries", "title": "Per-Node FS Available (bytes)",
          "gridPos": {"x":12,"y":12,"w":12,"h":8},
          "targets": [{"expr":"opensearch_fs_total_available_bytes","refId":"A","legendFormat":"{{name}}"}] }
      ]
    }

  # --- §5 노드 장애 회복 ---
  dashboards__ingest-pipeline__opensearch__chaos-node-recovery.json: |
    {
      "uid": "loadtest-os-chaos-node",
      "title": "OpenSearch Chaos — Node Failure Recovery",
      "tags": ["loadtest", "opensearch", "chaos", "scenario-5"],
      "schemaVersion": 39, "version": 1, "refresh": "10s",
      "time": { "from": "now-15m", "to": "now" },
      "panels": [
        { "id": 1, "type": "stat", "title": "Cluster Status",
          "gridPos": {"x":0,"y":0,"w":8,"h":6},
          "targets": [{"expr":"(opensearch_cluster_status + 1)","refId":"A"}] },
        { "id": 2, "type": "stat", "title": "Active Nodes",
          "gridPos": {"x":8,"y":0,"w":4,"h":6},
          "targets": [{"expr":"max(opensearch_cluster_nodes_number)","refId":"A"}] },
        { "id": 3, "type": "stat", "title": "Time in YELLOW (last 1h, sec)",
          "gridPos": {"x":12,"y":0,"w":6,"h":6},
          "targets": [{"expr":"sum_over_time((opensearch_cluster_status == 1)[1h:30s]) * 30","refId":"A"}] },
        { "id": 4, "type": "stat", "title": "Time in RED (last 1h, sec)",
          "gridPos": {"x":18,"y":0,"w":6,"h":6},
          "targets": [{"expr":"sum_over_time((opensearch_cluster_status == 2)[1h:30s]) * 30","refId":"A"}] },
        { "id": 5, "type": "timeseries", "title": "Status Numeric (1=G 2=Y 3=R) — recovery curve",
          "gridPos": {"x":0,"y":6,"w":24,"h":8},
          "targets": [{"expr":"(opensearch_cluster_status + 1)","refId":"A"}] },
        { "id": 6, "type": "timeseries", "title": "Shard Recovery Stages",
          "gridPos": {"x":0,"y":14,"w":24,"h":8},
          "targets": [
            {"expr":"max(opensearch_cluster_shards_number{type=\"unassigned\"})","refId":"A","legendFormat":"unassigned"},
            {"expr":"max(opensearch_cluster_shards_number{type=\"initializing\"})","refId":"B","legendFormat":"initializing"},
            {"expr":"max(opensearch_cluster_shards_number{type=\"relocating\"})","refId":"C","legendFormat":"relocating"}
          ]
        }
      ]
    }

  # --- §6 스토리지 (PV) 장애 회복 ---
  dashboards__ingest-pipeline__opensearch__chaos-pv-recovery.json: |
    {
      "uid": "loadtest-os-chaos-pv",
      "title": "OpenSearch Chaos — PV Loss Recovery",
      "tags": ["loadtest", "opensearch", "chaos", "scenario-6"],
      "schemaVersion": 39, "version": 1, "refresh": "10s",
      "time": { "from": "now-30m", "to": "now" },
      "panels": [
        { "id": 1, "type": "stat", "title": "Cluster Status",
          "gridPos": {"x":0,"y":0,"w":6,"h":6},
          "targets": [{"expr":"(opensearch_cluster_status + 1)","refId":"A"}] },
        { "id": 2, "type": "stat", "title": "Min FS Available (bytes)",
          "gridPos": {"x":6,"y":0,"w":6,"h":6},
          "targets": [{"expr":"min(opensearch_fs_total_available_bytes)","refId":"A"}] },
        { "id": 3, "type": "stat", "title": "Time in RED (1h, sec)",
          "gridPos": {"x":12,"y":0,"w":6,"h":6},
          "targets": [{"expr":"sum_over_time((opensearch_cluster_status == 2)[1h:30s]) * 30","refId":"A"}] },
        { "id": 4, "type": "stat", "title": "Active Nodes",
          "gridPos": {"x":18,"y":0,"w":6,"h":6},
          "targets": [{"expr":"max(opensearch_cluster_nodes_number)","refId":"A"}] },
        { "id": 5, "type": "timeseries", "title": "Status Numeric (recovery curve)",
          "gridPos": {"x":0,"y":6,"w":24,"h":8},
          "targets": [{"expr":"(opensearch_cluster_status + 1)","refId":"A"}] },
        { "id": 6, "type": "timeseries", "title": "Per-Node FS Available",
          "gridPos": {"x":0,"y":14,"w":12,"h":8},
          "targets": [{"expr":"opensearch_fs_total_available_bytes","refId":"A","legendFormat":"{{name}}"}] },
        { "id": 7, "type": "timeseries", "title": "Initializing/Unassigned Shards (recovery progress)",
          "gridPos": {"x":12,"y":14,"w":12,"h":8},
          "targets": [
            {"expr":"max(opensearch_cluster_shards_number{type=\"unassigned\"})","refId":"A","legendFormat":"unassigned"},
            {"expr":"max(opensearch_cluster_shards_number{type=\"initializing\"})","refId":"B","legendFormat":"initializing"}
          ]
        }
      ]
    }

  # --- Ingest Pipeline / Fluent Bit ---
  dashboards__ingest-pipeline__fluent-bit__pipeline-throughput.json: |
    {
      "uid": "loadtest-fb-throughput",
      "title": "Fluent Bit Pipeline Throughput",
      "tags": ["loadtest", "fluent-bit", "throughput"],
      "schemaVersion": 39, "version": 1, "refresh": "15s",
      "time": { "from": "now-30m", "to": "now" },
      "panels": [
        { "id": 1, "type": "timeseries", "title": "Records / sec",
          "gridPos": {"x":0,"y":0,"w":24,"h":8},
          "targets": [{"expr":"rate(fluentbit_input_records_total[1m])","refId":"A"}] }
      ]
    }
  dashboards__ingest-pipeline__fluent-bit__memory-usage.json: |
    {
      "uid": "loadtest-fb-memory",
      "title": "Fluent Bit Memory Usage",
      "tags": ["loadtest", "fluent-bit", "memory"],
      "schemaVersion": 39, "version": 1, "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "panels": [
        { "id": 1, "type": "timeseries", "title": "RSS by Pod",
          "gridPos": {"x":0,"y":0,"w":24,"h":8},
          "targets": [{"expr":"container_memory_rss{container=\"fluent-bit\"}","refId":"A"}] }
      ]
    }

  # --- Infrastructure / Compute ---
  dashboards__infrastructure__compute__node-overview.json: |
    {
      "uid": "loadtest-node-overview",
      "title": "Node Overview",
      "tags": ["loadtest", "infrastructure", "node"],
      "schemaVersion": 39, "version": 1, "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "panels": [
        { "id": 1, "type": "timeseries", "title": "CPU Usage",
          "gridPos": {"x":0,"y":0,"w":12,"h":8},
          "targets": [{"expr":"100 - (avg by (instance)(rate(node_cpu_seconds_total{mode=\"idle\"}[5m])) * 100)","refId":"A"}] },
        { "id": 2, "type": "timeseries", "title": "Memory Available",
          "gridPos": {"x":12,"y":0,"w":12,"h":8},
          "targets": [{"expr":"node_memory_MemAvailable_bytes","refId":"A"}] }
      ]
    }
  dashboards__infrastructure__compute__pod-resources.json: |
    {
      "uid": "loadtest-pod-resources",
      "title": "Pod Resource Usage",
      "tags": ["loadtest", "infrastructure", "pod"],
      "schemaVersion": 39, "version": 1, "refresh": "30s",
      "time": { "from": "now-30m", "to": "now" },
      "panels": [
        { "id": 1, "type": "timeseries", "title": "Top 10 CPU",
          "gridPos": {"x":0,"y":0,"w":24,"h":10},
          "targets": [{"expr":"topk(10, rate(container_cpu_usage_seconds_total{container!=\"\"}[5m]))","refId":"A"}] }
      ]
    }

  # --- Infrastructure / Network ---
  dashboards__infrastructure__network__connectivity.json: |
    {
      "uid": "loadtest-net-connectivity",
      "title": "Network Connectivity",
      "tags": ["loadtest", "infrastructure", "network"],
      "schemaVersion": 39, "version": 1, "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "panels": [
        { "id": 1, "type": "timeseries", "title": "Receive Bytes / sec",
          "gridPos": {"x":0,"y":0,"w":12,"h":8},
          "targets": [{"expr":"rate(node_network_receive_bytes_total{device!~\"lo|veth.*\"}[5m])","refId":"A"}] },
        { "id": 2, "type": "timeseries", "title": "Transmit Bytes / sec",
          "gridPos": {"x":12,"y":0,"w":12,"h":8},
          "targets": [{"expr":"rate(node_network_transmit_bytes_total{device!~\"lo|veth.*\"}[5m])","refId":"A"}] }
      ]
    }

