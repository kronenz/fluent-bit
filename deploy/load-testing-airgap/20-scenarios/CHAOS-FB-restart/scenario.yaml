# CHAOS-FB — fluent-bit DaemonSet 재시작 시 offset DB 보존 검증
#
# concept 의 "장애 테스트" — fluent-bit pod 가 죽은 후 재시작될 때 이미
# 읽은 로그를 다시 보내지 않아야 하고 (중복 ingest), 못 읽은 로그가 누락
# 되어서도 안 됨 (gap). 이는 offset DB 가 hostPath / PVC 에 영구 저장되어
# 있어야 가능.
apiVersion: batch/v1
kind: Job
metadata:
  name: chaos-fb-restart
  namespace: load-test
  labels: { app: chaos-fb-restart, role: chaos-runner, scenario: FB-CHAOS }
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels: { app: chaos-fb-restart, scenario: FB-CHAOS }
    spec:
      restartPolicy: Never
      serviceAccountName: kube-burner
      containers:
        - name: chaos-runner
          image: nexus.intranet:8082/loadtest/loadtest-tools:0.1.2
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef: { name: lt-config }
            - secretRef:
                name: opensearch-creds
                optional: true
          env:
            - { name: FB_NS,           value: "monitoring" }
            - { name: FB_DS_LABEL,     value: "app.kubernetes.io/name=fluent-bit" }
            - { name: INDEX_PATTERN,   value: "logs-fb-*" }
            - { name: SETTLE_SECONDS,  value: "60" }   # restart 전후 안정화
          command: ["bash", "-c"]
          args:
            - |
              set -euo pipefail
              echo "=== CHAOS-FB — fluent-bit restart, offset DB 검증 ==="

              CURL_AUTH=()
              [[ -n "${OS_BASIC_AUTH_USER:-}" ]] && CURL_AUTH=(-u "${OS_BASIC_AUTH_USER}:${OS_BASIC_AUTH_PASS}")

              os_count() {
                # OS 인덱스의 현재 doc count
                curl -fsS "${CURL_AUTH[@]}" "${OPENSEARCH_URL}/${INDEX_PATTERN}/_count" \
                  | python3 -c 'import sys,json;print(json.load(sys.stdin).get("count",0))'
              }

              echo "[1] flog 가동 상태 확인"
              kubectl -n load-test get deploy/flog-loader

              echo "[2] T0 안정화 (${SETTLE_SECONDS}s)"
              sleep "${SETTLE_SECONDS}"
              C0=$(os_count)
              echo "    pre-restart count = ${C0}"

              echo "[3] fluent-bit DaemonSet 재시작"
              kubectl -n "${FB_NS}" rollout restart ds -l "${FB_DS_LABEL}" || \
                kubectl -n "${FB_NS}" delete pod -l "${FB_DS_LABEL}"

              echo "[4] DaemonSet 회복 대기"
              kubectl -n "${FB_NS}" rollout status ds -l "${FB_DS_LABEL}" --timeout=120s || \
                until kubectl -n "${FB_NS}" get pod -l "${FB_DS_LABEL}" \
                       -o jsonpath='{.items[*].status.phase}' | grep -q Running; do
                  sleep 5
                done
              echo "    fluent-bit pods running"

              echo "[5] T1 안정화 (${SETTLE_SECONDS}s)"
              sleep "${SETTLE_SECONDS}"
              C1=$(os_count)
              echo "    post-restart count = ${C1}"

              # flog rate 추정 (3 replica × 10k lines/s 가정)
              # 안정화 동안 들어가야 할 최소 doc 수 (대략)
              EXPECTED_MIN=$((SETTLE_SECONDS * 1000))   # 보수적 추정 1k/s
              DELTA=$((C1 - C0))
              echo
              echo "=== 결과 ==="
              echo "Δ count = ${DELTA} (over ${SETTLE_SECONDS}s, expected ≥ ${EXPECTED_MIN})"

              # 결과 판정
              if [[ ${DELTA} -ge ${EXPECTED_MIN} ]]; then
                echo "[PASS] ingest 끊김 없음 — offset DB 가 보존됨"
              else
                echo "[FAIL] ingest gap 의심 — offset DB / hostPath 검증 필요"
                exit 1
              fi
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits:   { cpu: "500m", memory: "256Mi" }
