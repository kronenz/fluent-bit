# 모든 시나리오 공통 — 네임스페이스
#
# monitoring : kube-prometheus-stack + opensearch + opensearch-exporter
# load-test  : 부하 발생기 + 테스트 Job (kube-burner 가 만드는 kburner-*
#              네임스페이스는 Job 종료 시 자동 GC 됨)
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
  labels: { purpose: monitoring-stack }
---
apiVersion: v1
kind: Namespace
metadata:
  name: load-test
  labels: { purpose: load-generation }
