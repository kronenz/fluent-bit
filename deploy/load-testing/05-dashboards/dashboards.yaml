apiVersion: v1
kind: ConfigMap
metadata:
  name: dash-load-test-fluent-bit
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  dash-load-test-fluent-bit.json: |-
    {
      "uid": "lt-fluent-bit",
      "title": "Load Test \u2022 Fluent-bit (FB)",
      "schemaVersion": 39,
      "version": 1,
      "editable": true,
      "tags": [
        "load-test"
      ],
      "time": {
        "from": "now-30m",
        "to": "now"
      },
      "refresh": "30s",
      "templating": {
        "list": [
          {
            "name": "datasource",
            "type": "datasource",
            "query": "prometheus",
            "current": {
              "text": "Prometheus",
              "value": "Prometheus"
            },
            "label": "Datasource"
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "text",
          "title": "",
          "gridPos": {
            "x": 0,
            "y": 0,
            "w": 24,
            "h": 14
          },
          "options": {
            "mode": "markdown",
            "content": "## \ud83e\udeb5 Fluent-bit \ubd80\ud558 \ud14c\uc2a4\ud2b8 (FB-01 ~ FB-05)\n\n**\ubaa9\uc801**: DaemonSet\uc73c\ub85c \ub3d9\uc791\ud558\ub294 Fluent-bit\uc758 \ub2e8\uc77c \uc778\uc2a4\ud134\uc2a4 \ucc98\ub9ac\ub7c9, backpressure \uac70\ub3d9, \uc190\uc2e4\ub960, \uc790\ub3d9 \ubcf5\uad6c\ub97c \uac80\uc99d\ud569\ub2c8\ub2e4.\n\n### \uc2dc\ub098\ub9ac\uc624\n| ID | \uc2dc\ub098\ub9ac\uc624 | \ud575\uc2ec \uc9c0\ud45c |\n|----|----------|-----------|\n| **FB-01** | \ub2e8\uc77c Pod throughput ceiling (30\ubd84, stress) | records/s, drops |\n| **FB-02** | \uc815\uc0c1 \uc6b4\uc601 \ubd80\ud558 (1\uc2dc\uac04, load) | CPU, buffer size |\n| **FB-03** | Output \uc7a5\uc560 \uc8fc\uc785 (chaos) | retries, filesystem buffer |\n| **FB-04** | \uba40\ud2f0\ub77c\uc778 \uc2a4\ud0dd\ud2b8\ub808\uc774\uc2a4 (load) | parse latency |\n| **FB-05** | \ub85c\uadf8 \ubc84\uc2a4\ud2b8 spike | backpressure, drop |\n\n### \ub370\uc774\ud130 \ud750\ub984\n```\nflog Pod (load-test ns) \u2500stdout\u2192 /var/log/containers/*.log\n    \u2192 Fluent-bit tail input \u2192 parser/filter \u2192 buffer (mem+filesystem)\n    \u2192 OpenSearch bulk output\n```\n- \ubd80\ud558\uae30: `mingrammer/flog` (`-f json -d 100us -l`), replicas\ub85c \ub178\ub4dc\ubcc4 \ubd80\ud558 \uc870\uc808.\n- \ucd9c\ub825: `opensearch-lt-node.monitoring.svc:9200` (logstash-format \u2192 `logs-fb-YYYY.MM.DD`).\n\n### SLO\n| \uc9c0\ud45c | \ubaa9\ud45c |\n|------|------|\n| per-pod throughput (FB-01) | \u2265 50,000 lines/s |\n| \uc190\uc2e4\ub960 (with `storage.type=filesystem`) | 0% |\n| tail \u2192 output p95 \uc9c0\uc5f0 | \u2264 5 s |\n| CPU | \u2264 pod limit 70% |\n| RSS | \u2264 pod limit 70% |\n\n### \ud575\uc2ec \uc9c0\ud45c \ud574\uc124\n- **Input Records Rate**: `rate(fluentbit_input_records_total[1m])` \u2014 tail input\uc774 \ucd08\ub2f9 \uc77d\uc740 \ub77c\uc778 \uc218.\n- **Output Processed Rate**: \uc815\uc0c1 \ucd9c\ub825\ub41c \ub808\ucf54\ub4dc. input rate\uc640 \ucc28\uc774\uac00 = drops/buffer \ub204\uc801.\n- **Output Errors / Retries**: \uc7ac\uc2dc\ub3c4\uac00 \ub204\uc801\ub418\uba74 backpressure \ubc1c\uc0dd. `Retry_Limit=False`\uba74 \ubb34\uc81c\ud55c \uc7ac\uc2dc\ub3c4\ub85c \ub370\uc774\ud130 \ubcf4\uc804.\n- **Storage Backlog**: `fluentbit_input_storage_chunks_busy_bytes` \u2014 filesystem buffer \ub204\uc801\ub7c9. \ub514\uc2a4\ud06c \uc5ec\uc720 \ubaa8\ub2c8\ud130\ub9c1 \ud544\uc218.\n\n### \ud29c\ub2dd \uc758\uc0ac\uacb0\uc815\n| \uc99d\uc0c1 | \uc870\uce58 |\n|------|------|\n| drops \ubc1c\uc0dd | `Mem_Buf_Limit`\u2191, `storage.type=filesystem` |\n| CPU throttling | `Workers`\u2191 (output), filter \ub2e8\uc21c\ud654 |\n| output \uc5d0\ub7ec \uc9c0\uc18d | OpenSearch bulk reject \uc870\uc0ac, backoff |\n| parser \uc9c0\uc5f0 | \uc815\uaddc\uc2dd \ub2e8\uc21c\ud654, multiline \ucd5c\uc801\ud654 |\n\n> \ub370\uc774\ud130 \ucd9c\ucc98: Fluent-bit `/api/v2/metrics/prometheus` (Job: `fluent-bit-lt`)\n"
          }
        },
        {
          "id": 2,
          "type": "row",
          "title": "Throughput (FB-01)",
          "collapsed": false,
          "gridPos": {
            "x": 0,
            "y": 14,
            "w": 24,
            "h": 1
          }
        },
        {
          "id": 3,
          "type": "timeseries",
          "title": "Input Records Rate",
          "description": "tail input\uc774 \ucd08\ub2f9 \uc77d\uc740 \ub85c\uadf8 \ub77c\uc778 \uc218. flog replicas\uc640 -d \uc635\uc158\uc5d0 \ub530\ub77c \ubcc0\ub3d9.",
          "gridPos": {
            "x": 0,
            "y": 15,
            "w": 12,
            "h": 7
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "min": 0
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "showLegend": true,
              "displayMode": "list"
            },
            "tooltip": {
              "mode": "multi"
            }
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "sum by (pod) (rate(fluentbit_input_records_total[1m]))",
              "legendFormat": "{{pod}}"
            }
          ]
        },
        {
          "id": 4,
          "type": "timeseries",
          "title": "Output Processed Rate",
          "description": "output\ubcc4 \uc815\uc0c1 \ucc98\ub9ac\ub41c \ub808\ucf54\ub4dc. input rate\uc640 \ube44\uad50\ud574 drops/\uc9c0\uc5f0 \uc5ec\ubd80 \ud655\uc778.",
          "gridPos": {
            "x": 12,
            "y": 15,
            "w": 12,
            "h": 7
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "min": 0
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "showLegend": true,
              "displayMode": "list"
            },
            "tooltip": {
              "mode": "multi"
            }
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "sum by (pod, name) (rate(fluentbit_output_proc_records_total[1m]))",
              "legendFormat": "{{pod}} {{name}}"
            }
          ]
        },
        {
          "id": 5,
          "type": "row",
          "title": "Reliability (FB-03/05)",
          "collapsed": false,
          "gridPos": {
            "x": 0,
            "y": 22,
            "w": 24,
            "h": 1
          }
        },
        {
          "id": 6,
          "type": "timeseries",
          "title": "Output Errors",
          "description": "output \uc5d0\ub7ec\uc728. 0 \uc720\uc9c0\uac00 \uc815\uc0c1. \uc99d\uac00 \uc2dc OpenSearch \uc751\ub2f5 \ucf54\ub4dc/\uc5f0\uacb0 \uc810\uac80.",
          "gridPos": {
            "x": 0,
            "y": 23,
            "w": 12,
            "h": 7
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "min": 0
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "showLegend": true,
              "displayMode": "list"
            },
            "tooltip": {
              "mode": "multi"
            }
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "sum by (name) (rate(fluentbit_output_errors_total[1m]))",
              "legendFormat": "{{name}}"
            }
          ]
        },
        {
          "id": 7,
          "type": "timeseries",
          "title": "Retries vs Retries Failed",
          "description": "\uc7ac\uc2dc\ub3c4 \ubc1c\uc0dd\ub960 / \uc7ac\uc2dc\ub3c4\uac00 \uacb0\uad6d \uc2e4\ud328\ud55c \ube44\uc728. failed > 0\uc774\uba74 \ub370\uc774\ud130 \uc190\uc2e4 \uc758\uc2ec.",
