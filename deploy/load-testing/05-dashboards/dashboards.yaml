            },
            "tooltip": {
              "mode": "multi"
            }
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "scrape_samples_scraped{job=\"node-exporter\"}",
              "legendFormat": "{{instance}}"
            }
