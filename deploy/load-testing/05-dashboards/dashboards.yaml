          "description": "1\ud68c scrape\uc5d0\uc11c \uc218\uc9d1\ub41c \uc0d8\ud50c \uc218. collector \ucd94\uac00/textfile \uc8fc\uc785\uc73c\ub85c \uc99d\uac00.",
