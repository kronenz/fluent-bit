          "fieldConfig": {
            "defaults": {
              "unit": "short"
            },
            "overrides": []
          },
          "options": {
            "colorMode": "value",
            "graphMode": "area"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "count(up==1)",
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              }
            }
          ]
        },
        {
          "id": 95,
          "type": "stat",
          "title": "Targets DOWN",
          "description": "0 \uc720\uc9c0\uac00 \uc815\uc0c1.",
          "gridPos": {
            "x": 6,
