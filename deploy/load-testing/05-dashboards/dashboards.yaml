            "uid": "${datasource}"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "min": 0
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "showLegend": true,
              "displayMode": "list"
            },
            "tooltip": {
              "mode": "multi"
            }
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "node_scrape_collector_duration_seconds",
              "legendFormat": "{{collector}} {{instance}}"
            }
          ]
        },
        {
          "id": 6,
          "type": "timeseries",
          "title": "node-exporter RSS",
          "description": "node-exporter \ud504\ub85c\uc138\uc2a4 \uba54\ubaa8\ub9ac. 50 MiB \uc774\ub0b4 \uc815\uc0c1.",
          "gridPos": {
            "x": 12,
            "y": 20,
            "w": 12,
            "h": 7
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "min": 0
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "showLegend": true,
              "displayMode": "list"
            },
            "tooltip": {
              "mode": "multi"
            }
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "process_resident_memory_bytes{job=\"node-exporter\"}",
              "legendFormat": "{{instance}}"
            }
          ]
        },
        {
          "id": 7,
          "type": "timeseries",
          "title": "node-exporter CPU",
          "description": "CPU \uc0ac\uc6a9\ub960. idle \ub178\ub4dc\uc5d0\uc11c 100m \uc774\ub0b4\uac00 \uc815\uc0c1.",
          "gridPos": {
