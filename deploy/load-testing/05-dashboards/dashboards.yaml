apiVersion: v1
kind: ConfigMap
metadata:
  name: dash-load-test-fluent-bit
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  dash-load-test-fluent-bit.json: |-
    {
      "uid": "lt-fluent-bit",
      "title": "Load Test \u2022 Fluent-bit (FB-01~07)",
      "schemaVersion": 39,
      "version": 1,
      "editable": true,
      "tags": [
        "load-test"
      ],
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "refresh": "30s",
      "templating": {
        "list": [
          {
            "name": "datasource",
            "type": "datasource",
            "query": "prometheus",
            "current": {
              "text": "Prometheus",
              "value": "Prometheus"
            },
            "label": "Datasource"
          }
        ]
      },
      "panels": [
        {
          "id": 118,
          "type": "text",
          "title": "",
          "gridPos": {
            "x": 0,
            "y": 0,
            "w": 24,
            "h": 14
          },
          "options": {
            "mode": "markdown",
            "content": "## \ud83e\udeb5 Fluent-bit \ubd80\ud558 \ud14c\uc2a4\ud2b8 \u2014 \uc804 \uc2dc\ub098\ub9ac\uc624 \ub300\uc2dc\ubcf4\ub4dc\n\nDaemonSet \ub3d9\uc791 \ud658\uacbd\uc5d0\uc11c \ub2e8\uc77c \uc778\uc2a4\ud134\uc2a4 \ucc98\ub9ac \ud55c\uacc4, \ucd9c\ub825 \uc7a5\uc560 \ubcf5\uad6c, \uba40\ud2f0\ub77c\uc778 \ud30c\uc2f1, \uc2a4\ud30c\uc774\ud06c/\uc18c\ud06c/\ub300\uc6a9\ub7c9 \ub77c\uc778\uc744 \ubaa8\ub450 \ub2e4\ub8f9\ub2c8\ub2e4.\n\n| \uc2dc\ub098\ub9ac\uc624 | \uc720\ud615 | \ub3c4\uad6c |\n|----------|------|------|\n| FB-01 \ub2e8\uc77c Pod throughput ceiling | Stress | flog \uace0\ubc00\ub3c4 |\n| FB-02 \uc815\uc0c1 \uc6b4\uc601 \ubd80\ud558 | Load | flog \ud3c9\uade0\uac12 |\n| FB-03 Output \uc7a5\uc560 \uc8fc\uc785 | Chaos | OpenSearch \uc77c\uc2dc \ub2e4\uc6b4 |\n| FB-04 \uba40\ud2f0\ub77c\uc778 \uc2a4\ud0dd\ud2b8\ub808\uc774\uc2a4 | Load | \uba40\ud2f0\ub77c\uc778 generator |\n| FB-05 \ub85c\uadf8 \ubc84\uc2a4\ud2b8 spike | Spike | flog rate \uae09\uc99d |\n| FB-06 Soak 24h | Soak | flog 24h \uc720\uc9c0 |\n| FB-07 \ub300\uc6a9\ub7c9 \ub85c\uadf8(line=16KB) | Stress | flog `--byte-size` |\n\n> \uba54\ud2b8\ub9ad \ucd9c\ucc98: Fluent-bit `/api/v2/metrics/prometheus` (Job: `fluent-bit-lt`).\n"
          }
        },
        {
          "id": 119,
          "type": "row",
          "title": "FB-01 \u2014 \ub2e8\uc77c Pod throughput ceiling",
          "collapsed": false,
          "gridPos": {
            "x": 0,
            "y": 14,
            "w": 24,
            "h": 1
          }
        },
        {
          "id": 120,
          "type": "text",
          "title": "",
          "gridPos": {
            "x": 0,
            "y": 15,
            "w": 24,
            "h": 12
          },
          "options": {
            "mode": "markdown",
            "content": "**\uc65c \uce21\uc815?**: per-pod \ud55c\uacc4\ub97c \uc54c\uc544\uc57c 200 \ub178\ub4dc \uc6b4\uc601 \uc2dc \uc790\uc6d0 \uc0b0\uc815 \uac00\ub2a5. \ud55c\uacc4 \ub3c4\ub2ec \uc2dc 'FB resource\ub97c \ub298\ub9b4 \uac83\uc778\uac00, \ub178\ub4dc\ub97c \ub298\ub9b4 \uac83\uc778\uac00' \ud310\ub2e8\uc758 \uadfc\uac70.\n\n**\ubaa9\uc801**: \ub2e8\uc77c Fluent-bit Pod\uac00 \ud758\ub824\ubcf4\ub0bc \uc218 \uc788\ub294 \ucd5c\ub300 \ub77c\uc778/\ucd08 \uce21\uc815.\n\n**\ubd80\ud558 \ud504\ub85c\ud30c\uc77c**: flog `-d 100us` \ubb34\ud55c \ub8e8\ud504, replicas\ub85c \ub178\ub4dc\ubcc4 \ubd80\ud558 \uc870\uc808. **SLO**: per-pod \u2265 50,000 lines/s, drop=0.\n\n**\ud29c\ub2dd**: drop \u2192 Mem_Buf_Limit\u2191, storage.type=filesystem; CPU throttling \u2192 Workers\u2191, filter \ub2e8\uc21c\ud654.\n"
          }
        },
        {
          "id": 121,
          "type": "timeseries",
          "title": "Input Records Rate per pod",
          "description": "tail input\uc774 \ucd08\ub2f9 \uc77d\uc740 \ub77c\uc778 \uc218.",
          "gridPos": {
            "x": 0,
            "y": 27,
            "w": 12,
            "h": 7
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "min": 0
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "showLegend": true,
              "displayMode": "list"
            },
            "tooltip": {
              "mode": "multi"
            }
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "sum by (pod) (rate(fluentbit_input_records_total[1m]))",
              "legendFormat": "{{pod}}"
            }
          ]
        },
        {
          "id": 122,
          "type": "timeseries",
          "title": "Output Processed Rate",
          "description": "input\uacfc \ucc28\uc774 = drop/buffer \ub204\uc801.",
          "gridPos": {
            "x": 12,
            "y": 27,
            "w": 12,
            "h": 7
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "min": 0
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "showLegend": true,
              "displayMode": "list"
            },
            "tooltip": {
              "mode": "multi"
            }
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "sum by (pod, name) (rate(fluentbit_output_proc_records_total[1m]))",
              "legendFormat": "{{pod}} {{name}}"
            }
          ]
        },
        {
          "id": 123,
          "type": "timeseries",
          "title": "CPU Usage",
          "description": "limit \uadfc\uc811 \uc2dc throttling.",
          "gridPos": {
            "x": 0,
            "y": 34,
            "w": 12,
            "h": 7
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "showLegend": true,
              "displayMode": "list"
            },
            "tooltip": {
              "mode": "multi"
            }
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "expr": "rate(container_cpu_usage_seconds_total{namespace=\"monitoring\",pod=~\"fluent-bit.*\",container=\"fluent-bit\"}[1m])",
