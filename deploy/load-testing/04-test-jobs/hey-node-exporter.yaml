# Maps to scenario NE-02 in docs/load-testing/04-node-exporter-load-test.md
# HTTP load directly against node-exporter /metrics on the host.
# Targets the node-exporter Service which kube-prometheus-stack exposes ClusterIP.
apiVersion: batch/v1
kind: Job
metadata:
  name: hey-node-exporter
  namespace: load-test
  labels: { app: hey-node-exporter, role: test-runner }
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels: { app: hey-node-exporter }
    spec:
      restartPolicy: Never
      containers:
        - name: hey
          image: loadtest-tools:0.1.0
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: lt-config   # NODE_EXPORTER_SVC, HEY_DURATION, HEY_CONCURRENCY, HEY_RPS_PER_WORKER
          # -z DURATION  : test duration
          # -c N         : concurrent workers
          # -q N         : per-worker RPS limit
          command: ["hey"]
          args: ["-z", "$(HEY_DURATION)",
                 "-c", "$(HEY_CONCURRENCY)",
                 "-q", "$(HEY_RPS_PER_WORKER)",
                 "$(NODE_EXPORTER_SVC)/metrics"]
          resources:
            requests: { cpu: "100m", memory: "64Mi" }
            limits:   { cpu: "1000m", memory: "256Mi" }
