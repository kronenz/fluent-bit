# Maps to scenario OS-01 in docs/load-testing/01-opensearch-load-test.md
# Single Job that runs opensearch-benchmark against the in-cluster OpenSearch.
# Logs result to stdout; for persistent results mount a PVC at /tmp.
apiVersion: batch/v1
kind: Job
metadata:
  name: opensearch-benchmark
  namespace: load-test
  labels: { app: opensearch-benchmark, role: test-runner }
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels: { app: opensearch-benchmark }
    spec:
      restartPolicy: Never
      containers:
        - name: benchmark
          image: opensearchproject/opensearch-benchmark:1.16.0
          # workload `geonames` is small (~3M docs); use `http_logs` for bigger volume.
          args:
            - "execute-test"
            - "--target-hosts=http://opensearch-lt.monitoring.svc:9200"
            - "--pipeline=benchmark-only"
            - "--workload=geonames"
            - "--test-procedure=append-no-conflicts-index-only"
            - "--client-options=verify_certs:false"
            - "--results-file=/tmp/result.json"
            - "--kill-running-processes"
          resources:
            requests: { cpu: "200m", memory: "512Mi" }
            limits:   { cpu: "2000m", memory: "1500Mi" }
