# OS-16 — light search workload during heavy ingest.
# Models the realistic prod pattern: 6 service teams running occasional
# `last 1h` range queries while ingest is at full throttle.
apiVersion: v1
kind: ConfigMap
metadata:
  name: k6-opensearch-light-search-script
  namespace: load-test
data:
  script.js: |
    import http from 'k6/http';
    import { check, sleep } from 'k6';

    // 6 VUs ≈ 6 service teams. Each VU pauses 5-15s between queries —
    // intermittent "open the dashboard, look around" style.
    export const options = {
      vus:      Number(__ENV.LIGHT_SEARCH_VUS || 6),
      duration: __ENV.LIGHT_SEARCH_DURATION || '30m',
      thresholds: {
        // SLO from OS-16: search p95 < 5s during heavy ingest
        http_req_duration: ['p(95)<5000', 'p(99)<10000'],
        http_req_failed:   ['rate<0.01'],
      },
    };

    const OS    = __ENV.OPENSEARCH_URL    || 'http://opensearch-lt-node.monitoring.svc:9200';
    const INDEX = __ENV.OS_INDEX_PATTERN  || 'logs-fb-*';

    // Realistic operational queries (last 1h with a filter, sometimes an agg).
    function buildQuery() {
      const services = ['spark-loadtest', 'airflow', 'trino', 'flog'];
      const levels   = ['ERROR', 'WARN', 'INFO'];
      const t = Date.now();
      const queries = [
        // 1. 마지막 1h 에러 로그 조회 (개별 쿼리)
        { range: { ts: { gte: (t/1000) - 3600 } } },
        // 2. 특정 서비스의 1h 로그
        { bool: { must: [
          { range: { ts: { gte: (t/1000) - 3600 } } },
          { match: { app: services[Math.floor(Math.random()*services.length)] } },
        ]}},
        // 3. 레벨별 카운트
        { bool: { must: [
          { range: { ts: { gte: (t/1000) - 3600 } } },
          { match: { level: levels[Math.floor(Math.random()*levels.length)] } },
        ]}},
      ];
      return queries[Math.floor(Math.random() * queries.length)];
    }

    export default function () {
      const body = JSON.stringify({ query: buildQuery(), size: 50 });
      const r = http.post(`${OS}/${INDEX}/_search`, body, {
        headers: { 'Content-Type': 'application/json' },
      });
      check(r, { '2xx': (res) => res.status >= 200 && res.status < 300 });
      // 팀 멤버가 결과 보고 다음 쿼리까지 5-15s 대기
      sleep(5 + Math.random() * 10);
    }
---
apiVersion: batch/v1
kind: Job
metadata:
  name: k6-opensearch-light-search
  namespace: load-test
  labels: { app: k6-opensearch-light-search, role: test-runner, scenario: OS-16 }
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels: { app: k6-opensearch-light-search }
    spec:
      restartPolicy: Never
      containers:
        - name: k6
          image: loadtest-tools:0.1.0
          imagePullPolicy: IfNotPresent
          command: ["k6", "run", "/scripts/script.js"]
          envFrom:
            - configMapRef:
                name: lt-config   # OPENSEARCH_URL, OS_INDEX_PATTERN
          env:
            - { name: LIGHT_SEARCH_VUS,      value: "6"   }
            - { name: LIGHT_SEARCH_DURATION, value: "30m" }
          volumeMounts:
            - { name: scripts, mountPath: /scripts }
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits:   { cpu: "500m", memory: "256Mi" }
      volumes:
        - name: scripts
          configMap: { name: k6-opensearch-light-search-script }
