# Standalone Prometheus exporter for OpenSearch.
# Uses prometheus-community/elasticsearch_exporter, which understands the
# OpenSearch REST API (_cluster/health, _nodes/stats, _all/_stats, etc).
# This avoids having to bake the prometheus-exporter plugin into the
# OpenSearch container image.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opensearch-exporter
  namespace: monitoring
  labels: { app: opensearch-exporter }
spec:
  replicas: 1
  selector:
    matchLabels: { app: opensearch-exporter }
  template:
    metadata:
      labels: { app: opensearch-exporter }
    spec:
      containers:
        - name: exporter
          image: quay.io/prometheuscommunity/elasticsearch-exporter:v1.10.0
          args:
            - --es.uri=http://opensearch-lt-node.monitoring.svc:9200
            - --es.all
            - --es.indices
            - --es.indices_settings
            - --es.shards
            - --es.timeout=30s
          ports:
            - { name: metrics, containerPort: 9114 }
          resources:
            requests: { cpu: "20m", memory: "32Mi" }
            limits:   { cpu: "200m", memory: "128Mi" }
          readinessProbe:
            httpGet: { path: /healthz, port: metrics }
          livenessProbe:
            httpGet: { path: /healthz, port: metrics }
---
apiVersion: v1
kind: Service
metadata:
  name: opensearch-exporter
  namespace: monitoring
  labels: { app: opensearch-exporter }
spec:
  selector: { app: opensearch-exporter }
  ports:
    - { name: metrics, port: 9114, targetPort: metrics }
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: opensearch-exporter
  namespace: monitoring
  labels: { app: opensearch-exporter }
spec:
  selector: { matchLabels: { app: opensearch-exporter } }
  endpoints:
    - port: metrics
      interval: 30s
