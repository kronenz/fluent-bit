# Fluent-bit DaemonSet, ships container logs to OpenSearch in `monitoring` ns.
# Uses helm chart `fluent/fluent-bit`.

kind: DaemonSet

resources:
  requests: { cpu: "50m", memory: "128Mi" }
  limits:   { cpu: "500m", memory: "512Mi" }

# Persistent buffer on host so we can validate filesystem buffer behavior.
extraVolumes:
  - name: flb-storage
    hostPath:
      path: /var/lib/flb-storage
      type: DirectoryOrCreate
extraVolumeMounts:
  - name: flb-storage
    mountPath: /var/log/flb-storage

config:
  service: |
    [SERVICE]
        Daemon Off
        Flush 1
        Log_Level info
        Parsers_File /fluent-bit/etc/parsers.conf
        Parsers_File /fluent-bit/etc/conf/custom_parsers.conf
        HTTP_Server On
        HTTP_Listen 0.0.0.0
        HTTP_Port 2020
        Health_Check On
        storage.path /var/log/flb-storage/
        storage.sync normal
        storage.checksum off
        storage.max_chunks_up 128
        storage.backlog.mem_limit 64M

  inputs: |
    [INPUT]
        Name tail
        Tag kube.*
        Path /var/log/containers/*.log
        multiline.parser docker, cri
        Refresh_Interval 5
        Mem_Buf_Limit 50MB
        storage.type filesystem
        Skip_Long_Lines On

  filters: |
    [FILTER]
        Name kubernetes
        Match kube.*
        Merge_Log On
        Keep_Log Off
        K8S-Logging.Parser On
        K8S-Logging.Exclude On

  outputs: |
    [OUTPUT]
        Name opensearch
        Match kube.*
        Host opensearch-lt.monitoring.svc
        Port 9200
        Index fluent-bit
        Logstash_Format On
        Logstash_Prefix logs-fb
        Time_Key @timestamp
        Suppress_Type_Name On
        Replace_Dots On
        HTTP_User admin
        HTTP_Passwd admin
        tls Off
        Trace_Error On
        Retry_Limit False
        Workers 2

  customParsers: |
    [PARSER]
        Name docker_no_time
        Format json
        Time_Keep Off
        Time_Key time
        Time_Format %Y-%m-%dT%H:%M:%S.%L

# Expose /metrics for Prometheus
serviceMonitor:
  enabled: true
  namespace: monitoring
  interval: 15s
  telemetryPath: /api/v2/metrics/prometheus
  labels: {}
